<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise - Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="page1">
    <!-- falling petals canvas -->
    <canvas id="petalCanvas"></canvas>

    <div class="content">
        <h1>Welcome 🌸</h1>
        <p>Solve the little puzzle to proceed.</p>
        <div id="puzzle">
            <!-- sliding puzzle grid; will be filled by JS -->
        </div>
        <button id="checkPuzzle">I've solved it</button>
        <div id="unlockSection" class="hidden">
            <div class="animation"></div>
            <button id="unlockButton">Unlock the Surprise 🌸</button>
        </div>
    </div>

    <div id="musicToggle">
        <button id="toggleMusic">🎵</button>
    </div>
    <audio id="backgroundMusic" loop>
        <!-- placeholder source; include a calm track named music.mp3 later -->
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
